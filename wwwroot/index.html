<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7e3e28" />
    <title>North End Coffee - Employee Check In</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="NorthEndOneEntrance.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
</head>

<body style="background: linear-gradient(135deg, #f5f0eb 0%, #e8ddd5 100%);">
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>navigator.serviceWorker.register('service-worker.js');</script>
    <script>
        let stream = null;
        
        // Initialize camera with simple approach
        window.initCamera = async function() {
            try {
                // Stop any existing stream
                window.stopCamera();
                
                const video = document.getElementById('cameraFeed');
                if (!video) {
                    return 'Camera element not found';
                }
                
                // Request camera access with simplest approach
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user' },
                    audio: false
                });
                
                video.srcObject = stream;
                await video.play();
                
                console.log('Camera started successfully');
                return ''; // Success
                
            } catch (error) {
                console.error('Camera error:', error);
                
                if (error.name === 'NotAllowedError') {
                    return 'Camera permission denied. Please allow camera access.';
                } else if (error.name === 'NotFoundError') {
                    return 'No camera found on this device.';
                } else if (error.name === 'NotReadableError') {
                    return 'Camera is already in use.';
                } else {
                    return `Camera error: ${error.message}`;
                }
            }
        }
        
        // Capture photo from video stream
        window.takePhoto = function() {
            try {
                const video = document.getElementById('cameraFeed');
                const canvas = document.getElementById('photoCanvas');
                
                if (!video || !canvas) {
                    return '';
                }
                
                // Set canvas size to match video
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                // Draw flipped image (mirror)
                const ctx = canvas.getContext('2d');
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(video, 0, 0);
                
                // Stop camera after capture
                window.stopCamera();
                
                // Return base64 image
                return canvas.toDataURL('image/jpeg', 0.9);
                
            } catch (error) {
                console.error('Capture error:', error);
                return '';
            }
        }
        
        // Stop camera stream
        window.stopCamera = function() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
                console.log('Camera stopped');
            }
        }
    </script>
</body>

</html>
